<h1 class="text-display-lg-mobile font-display-lg-mobile text-on-surface mb-2">Create Account</h1>
<p class="text-body-lg font-body-lg text-on-surface-variant">Start your journey today</p>
</div>
<!-- Form Container -->
<div class="w-full max-w-md bg-surface-container-lowest rounded-xl premium-shadow p-6 space-y-stack-gap-md border border-outline-variant/30">
<form class="space-y-stack-gap-md" id="signup-form" onsubmit="event.preventDefault();">
<!-- Row 1: Names -->
<div class="flex gap-stack-gap-sm">
<div class="flex-1 space-y-1">
<label class="text-label-md font-label-md text-on-surface-variant block ml-1">First Name</label>
<div class="form-input-focus group flex items-center bg-surface-container-low border border-outline-variant rounded-lg px-3 py-2 transition-all duration-200">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary mr-2" data-icon="person">person</span>
<input class="w-full bg-transparent border-none p-0 text-body-md focus:ring-0 placeholder:text-outline/50" placeholder="Jane" type="text"/>
</div>
</div>
<div class="flex-1 space-y-1">
<label class="text-label-md font-label-md text-on-surface-variant block ml-1">Last Name</label>
<div class="form-input-focus group flex items-center bg-surface-container-low border border-outline-variant rounded-lg px-3 py-2 transition-all duration-200">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary mr-2" data-icon="person">person</span>
<input class="w-full bg-transparent border-none p-0 text-body-md focus:ring-0 placeholder:text-outline/50" placeholder="Doe" type="text"/>
</div>
</div>
</div>
<!-- Email Field -->
<div class="space-y-1">
<label class="text-label-md font-label-md text-on-surface-variant block ml-1">Email</label>
<div class="form-input-focus group flex items-center bg-surface-container-low border border-outline-variant rounded-lg px-3 py-2 transition-all duration-200">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary mr-2" data-icon="mail">mail</span>
<input class="w-full bg-transparent border-none p-0 text-body-md focus:ring-0 placeholder:text-outline/50" placeholder="jane@example.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1">
<label class="text-label-md font-label-md text-on-surface-variant block ml-1">Password</label>
<div class="form-input-focus group flex items-center bg-surface-container-low border border-outline-variant rounded-lg px-3 py-2 transition-all duration-200">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary mr-2" data-icon="lock">lock</span>
<input class="w-full bg-transparent border-none p-0 text-body-md focus:ring-0 placeholder:text-outline/50" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-1">
<label class="text-label-md font-label-md text-on-surface-variant block ml-1">Confirm Password</label>
<div class="form-input-focus group flex items-center bg-surface-container-low border border-outline-variant rounded-lg px-3 py-2 transition-all duration-200">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary mr-2" data-icon="shield">shield</span>
<input class="w-full bg-transparent border-none p-0 text-body-md focus:ring-0 placeholder:text-outline/50" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-3 mt-4">
<input class="mt-1 w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary/20" id="terms" type="checkbox"/>
<label class="text-caption font-caption text-on-surface-variant" for="terms">
                        I agree to the <a class="text-primary font-semibold hover:underline" href="#">Terms of Service</a> and <a class="text-primary font-semibold hover:underline" href="#">Privacy Policy</a>.
                    </label>
</div>
</form>
</div>
<!-- Action Button -->
<div class="w-full max-w-md mt-stack-gap-lg px-2">
<button class="w-full h-[56px] bg-primary hover:bg-primary-container text-on-primary font-bold rounded-full premium-shadow flex items-center justify-center gap-2 active:scale-95 transition-all duration-200">
<span>Sign Up</span>
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">arrow_forward</span>
</button>
<p class="text-center mt-6 text-label-md font-label-md text-on-surface-variant">
                Already have an account? 
                <a class="text-primary font-bold hover:underline" href="#">Log in</a>
</p>
</div>
</main>
<!-- Footer Security Badge (Decorative) -->
<footer class="p-container-padding text-center">
<div class="inline-flex items-center gap-2 px-4 py-2 bg-surface-container rounded-full text-caption text-on-surface-variant">
<span class="material-symbols-outlined text-outline text-[16px]">verified_user</span>
<span>256-bit SSL Secure Encryption</span>
</div>
</footer>
<script>
        // Micro-interaction for form progress
        const inputs = document.querySelectorAll('input');
        const progressBar = document.getElementById('progress-bar');
        
        inputs.forEach(input => {
            input.addEventListener('input', () => {
                let filled = 0;
                inputs.forEach(i => {
                    if (i.type === 'checkbox') {
                        if (i.checked) filled++;
                    } else {
                        if (i.value.length > 0) filled++;
                    }
                });
                const percentage = (filled / inputs.length) * 100;
                progressBar.style.width = Math.max(33.3, percentage) + '%';
            });
        });
    </script>
